[iceoryx2-integrations-ros2-humble]
image=docker.io/library/ros:humble
pull=true
additional_packages="ros-dev-tools ros-humble-demo-nodes-cpp ros-humble-rmw-cyclonedds-cpp build-essential pkg-config libclang-dev python3-pip curl tmux"
init_hooks="echo 'source /opt/ros/humble/setup.bash' >> /etc/bash.bashrc; echo 'export RMW_IMPLEMENTATION=rmw_cyclonedds_cpp' >> /etc/bash.bashrc; curl -sSfL https://just.systems/install.sh | bash -s -- --to /usr/local/bin"
