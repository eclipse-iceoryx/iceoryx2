[package]
name = "iceoryx2-conformance-tests"
description = "iceoryx2: Conformance tests for iceoryx2 components and extensions"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
default = []
std = [
  "iceoryx2/std",
  "iceoryx2-bb-concurrency/std",
  "iceoryx2-bb-container/std",
  "iceoryx2-bb-derive-macros/std",
  "iceoryx2-bb-elementary/std",
  "iceoryx2-bb-posix/std",
  "iceoryx2-bb-testing/std",
  "iceoryx2-bb-testing-macros/std",
  "iceoryx2-cal/std",
  "iceoryx2-log/std",
  "iceoryx2-pal-print/std",
]

[[test]]
name = "tests"
harness = false

[dependencies]
iceoryx2 = { workspace = true }
iceoryx2-bb-concurrency = { workspace = true }
iceoryx2-bb-conformance-test-macros = { workspace = true }
iceoryx2-bb-container = { workspace = true }
iceoryx2-bb-derive-macros = { workspace = true }
iceoryx2-bb-elementary = { workspace = true }
iceoryx2-bb-posix = { workspace = true }
iceoryx2-bb-testing = { workspace = true }
iceoryx2-bb-testing-macros = { workspace = true }
iceoryx2-cal = { workspace = true }
iceoryx2-log = { workspace = true }
iceoryx2-pal-print = { workspace = true }

[dev-dependencies]
iceoryx2-conformance-tests-common = { workspace = true, features = ["std"]  }
