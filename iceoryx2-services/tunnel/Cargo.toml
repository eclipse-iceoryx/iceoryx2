[package]
name = "iceoryx2-services-tunnel"
description = "iceoryx2-services: network tunneling service"
autotests = false
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
readme = "README.md"
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
default = ["std"]
std = [
  "iceoryx2-log/std",
  "iceoryx2-services-common/std",
  "iceoryx2-services-discovery/std",
  "iceoryx2-services-tunnel-backend/std",
  "iceoryx2/std",
  "iceoryx2-bb-container/std",
  "iceoryx2-bb-concurrency/std",
]

[dependencies]
iceoryx2-log = { workspace = true }
iceoryx2 = { workspace = true }
iceoryx2-bb-container = { workspace = true }
iceoryx2-bb-concurrency = { workspace = true }
iceoryx2-services-common = { workspace = true }
iceoryx2-services-discovery = { workspace = true }
iceoryx2-services-tunnel-backend = { workspace = true }

[[test]]
name = "tunnel-tests"
path = "tests/main.rs"
harness = false

[dev-dependencies]
iceoryx2-bb-loggers = { workspace = true, features = ["std", "console"] }
iceoryx2-bb-testing = { workspace = true, features = ["std"] }
iceoryx2-bb-testing-macros = { workspace = true, features = ["std"] }
iceoryx2-services-tunnel-conformance-tests = { workspace = true, features = ["std"] }
iceoryx2-services-tunnel-tests-common = { workspace = true, features = ["std"] }
