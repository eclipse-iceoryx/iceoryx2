name: Nightly

on:
  schedule:
  # Runs at 1 AM UTC timezone, Monday through Friday
  - cron: "0 1 * * 1-5"
  workflow_dispatch:


jobs:
  cargo-nextest-nightly:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # version v6.0.1
      - name: Build and cache cargo-nextest
        uses: ./.github/actions/build-and-cache-rust-tool
        with:
          rust-toolchain: stable
          check-and-install-cmd: cargo-nextest --version > /dev/null || cargo install cargo-nextest --locked
          print-version-cmd: cargo-nextest --version
          # increment cache-N-${{}} if a new nextest version is required
          cache-key: cache-2-${{ matrix.os }}-cargo-nextest
          artifact-bin-name: cargo-nextest
          artifact-upload-name: ${{ matrix.os }}-cargo-nextest

  static-code-analysis-rust-nightly:
    strategy:
      matrix:
        os: [windows-latest]
    uses: ./.github/workflows/reuse_static_code_analysis.yml
    with:
      os: ${{ matrix.os }}

  x86_32-nightly:
    needs: [static-code-analysis-rust-nightly, cargo-nextest-nightly]
    strategy:
      matrix:
        os: [ubuntu-latest] # [windows-latest, ubuntu-latest, macos-latest]
        toolchain: [stable] # [stable, 1.85.0, beta, nightly]
    uses: ./.github/workflows/reuse_x86_32.yml
    with:
      os: ${{ matrix.os }}
      toolchain: ${{ matrix.toolchain }}
      profile: "release"

  sdk-stable-nightly:
    needs: [static-code-analysis-rust-nightly, cargo-nextest-nightly]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, 1.85.0]
        profile: ["release", "debug"]
        include:
          - toolchain: stable
            profile: "debug"
            os: ubuntu-24.04-arm
        exclude:
          - os: ubuntu-latest # already tested in Pull-Requests and main branch
            toolchain: stable
            profile: "release"
    uses: ./.github/workflows/reuse_stable.yml
    with:
      os: ${{ matrix.os }}
      toolchain: ${{ matrix.toolchain }}
      profile: ${{ matrix.profile }}
      workspace: sdk

  integrations-stable-nightly:
    needs: [static-code-analysis-rust-nightly, cargo-nextest-nightly]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, 1.88.0]
        profile: ["release", "debug"]
        exclude:
          - os: ubuntu-latest # already tested in Pull-Requests and main branch
            toolchain: stable
            profile: "release"
    uses: ./.github/workflows/reuse_stable.yml
    with:
      os: ${{ matrix.os }}
      toolchain: ${{ matrix.toolchain }}
      profile: ${{ matrix.profile }}
      workspace: integrations

  unstable-nightly:
    needs: [static-code-analysis-rust-nightly, cargo-nextest-nightly]
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        toolchain: [beta, nightly]
        profile: ["debug", "release"]
        include:
          - toolchain: nightly
            profile: "debug"
            os: ubuntu-24.04-arm
        exclude:
          - os: ubuntu-latest # Already run in Pull-Requests
            toolchain: beta
            profile: "debug"
          - os: ubuntu-latest # Already run in Pull-Requests
            toolchain: nightly
            profile: "debug"
    uses: ./.github/workflows/reuse_unstable.yml
    with:
      os: ${{ matrix.os }}
      toolchain: ${{ matrix.toolchain }}
      profile: ${{ matrix.profile }}
