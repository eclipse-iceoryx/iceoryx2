name: Reusable workflow for static code analysis

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  static-code-analysis-rust:
    timeout-minutes: 40
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # version v6.0.1

      - name: Install just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # version: v3.1.0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@e0021407031f5be11a464abee9a0776171c79891 # version: v47.0.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # version: v1
        with:
          toolchain: stable
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@bafd42bd91680affe190f697cac6ef3ad958ecba # version: v0.0.9

      - name: Set caching env vars on non-Windows
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Run cargo clippy with default features for 'std' in debug mode
        run: |
          just verify sdk clippy
          just verify integrations clippy

      - name: Run cargo clippy with default features for 'std' in release mode
        run: |
          just verify sdk clippy --release
          just verify integrations clippy --release

      - name: Run cargo clippy with no-default features for 'no_std' in debug mode
        if: ${{ runner.os == 'Linux' }}
        # NOTE: the following crates are excluded because:
        #       * iceoryx2-ffi-c -> clippy uses std itself and complains about the panic handler
        #       * iceoryx2-cli -> the CLI requires std
        run: |
            just verify sdk clippy --no_std \
                -- \
                --exclude iceoryx2-ffi-c \
                --exclude iceoryx2-cli

      - name: Run cargo clippy with no-default features for 'no_std' in release mode
        if: ${{ runner.os == 'Linux' }}
        # NOTE: the following crates are excluded because:
        #       * iceoryx2-ffi-c -> clippy uses std itself and complains about the panic handler
        #       * iceoryx2-cli -> the CLI requires std
        run: |
            just verify sdk clippy --no_std \
                --release \
                -- \
                --exclude iceoryx2-ffi-c \
                --exclude iceoryx2-cli

      - name: Setup miri
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # version: v1
        with:
          toolchain: nightly
          components: miri

      - name: Run cargo miri
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          just verify sdk miri
          just verify integrations miri
