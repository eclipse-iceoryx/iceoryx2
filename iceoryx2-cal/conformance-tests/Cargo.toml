[package]
name = "iceoryx2-cal-conformance-tests"
description = "iceoryx2: Conformance tests for iceoryx2-cal components and extensions"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
default = []

std = [
  "iceoryx2-cal/std",
  "iceoryx2-bb-concurrency/std",
  "iceoryx2-bb-container/std",
  "iceoryx2-bb-loggers/std",
  "iceoryx2-bb-memory/std",
  "iceoryx2-bb-posix/std",
  "iceoryx2-bb-system-types/std",
  "iceoryx2-bb-testing/std",
  "iceoryx2-bb-testing-macros/std",
  "iceoryx2-pal-posix/std",
  "iceoryx2-pal-print/std",
]

[[test]]
name = "tests"
harness = false

[dependencies]
iceoryx2-cal = { workspace = true }
iceoryx2-bb-concurrency = { workspace = true }
iceoryx2-bb-conformance-test-macros = { workspace = true }
iceoryx2-bb-container = { workspace = true }
iceoryx2-bb-elementary-traits = { workspace = true }
iceoryx2-bb-loggers = { workspace = true }
iceoryx2-bb-memory = { workspace = true }
iceoryx2-bb-posix = { workspace = true }
iceoryx2-bb-system-types = { workspace = true }
iceoryx2-bb-testing = { workspace = true }
iceoryx2-bb-testing-macros = { workspace = true }
iceoryx2-pal-posix = { workspace = true }
iceoryx2-pal-print = { workspace = true }

serde = { workspace = true }

[dev-dependencies]
iceoryx2-cal-conformance-tests-common = { workspace = true, features = ["std"]  }

postcard = { workspace = true }
toml = { workspace = true }
