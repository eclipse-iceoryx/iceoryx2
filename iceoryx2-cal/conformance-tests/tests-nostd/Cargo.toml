[package]
name = "iceoryx2-cal-conformance-tests-nostd"
description = "iceoryx2: [internal] nostd deployment of iceoryx2-cal-conformance-tests"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
# Default to noop to support std workspace builds
default = [ "std" ]

std = [
  "iceoryx2-bb-testing-macros/std",
  "iceoryx2-bb-testing/std",
  "iceoryx2-pal-print/std",
]

[dependencies]
iceoryx2-cal = { workspace = true, features = [] }
iceoryx2-cal-conformance-tests = { workspace = true, features = [] }
iceoryx2-cal-conformance-tests-common = { workspace = true, features = [] }
iceoryx2-bb-concurrency = { workspace = true, features = [] }
iceoryx2-bb-loggers = { workspace = true, features = [] }
iceoryx2-bb-elementary-traits = { workspace = true }
iceoryx2-bb-memory = { workspace = true, features = [] }

iceoryx2-bb-testing-macros = { workspace = true }
iceoryx2-bb-testing = { workspace = true }
iceoryx2-pal-print = { workspace = true }
