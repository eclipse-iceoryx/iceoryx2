[package]
name = "iceoryx2-bb-threadsafe"
description = "iceoryx2: [internal] threadsafe non-lock-free containers and constructs"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
default = []

std = [
  "iceoryx2-log/std",  
  "iceoryx2-bb-container/std",  
  "iceoryx2-bb-elementary/std",  
  "iceoryx2-bb-posix/std",  
]

[dependencies]
iceoryx2-log = { workspace = true }
iceoryx2-bb-container = { workspace = true }
iceoryx2-bb-elementary = { workspace = true }
iceoryx2-bb-elementary-traits = { workspace = true }
iceoryx2-bb-posix = { workspace = true }

[dev-dependencies]
iceoryx2-bb-threadsafe-tests-common = { workspace = true, features = ["std"] }
iceoryx2-bb-loggers = { workspace = true, features = ["std"] }
iceoryx2-bb-testing = { workspace = true, features = ["std"] }
