[package]
name = "iceoryx2-bb-posix-tests-nostd"
description = "iceoryx2: [internal] nostd deployment of iceoryx2-bb-posix tests"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
# Default to noop to support std workspace builds
default = ["std"]

std = [
  "iceoryx2-bb-loggers/std",  
  "iceoryx2-bb-memory/std",  
  "iceoryx2-bb-posix-tests-common/std",  
  "iceoryx2-bb-posix/std",  
  "iceoryx2-bb-testing-macros/std",
  "iceoryx2-bb-testing/std",
  "iceoryx2-pal-print/std",  
]

[dependencies]
iceoryx2-bb-posix-tests-common = { workspace = true }
iceoryx2-bb-posix = { workspace = true }
iceoryx2-bb-loggers = { workspace = true }
iceoryx2-bb-elementary-traits = { workspace = true }
iceoryx2-bb-memory = { workspace = true }
iceoryx2-pal-print = { workspace = true }
iceoryx2-bb-testing-macros = { workspace = true }
iceoryx2-bb-testing = { workspace = true }
