[package]
name = "iceoryx2-bb-flatbuffers"
description = "iceoryx2: [internal] helper functions for smooth flatbuffer integration"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
default = []

std = [
    "iceoryx2-bb-container/std",
    "iceoryx2-bb-system-types/std",
    "iceoryx2-bb-posix/std",
]

[[test]]
name = "iceoryx2-bb-flatbuffers-tests"
path = "tests/tests.rs"
harness = false

[dependencies]
iceoryx2-bb-container = { workspace = true }
iceoryx2-bb-posix = { workspace = true }
iceoryx2-bb-system-types = { workspace = true }

[dev-dependencies]
iceoryx2-bb-flatbuffers-tests-common = { workspace = true, features = ["std"] }
iceoryx2-bb-loggers = { workspace = true, features = ["std"]  }
iceoryx2-bb-testing = { workspace = true, features = ["std"]  }
