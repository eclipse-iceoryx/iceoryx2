[package]
name = "iceoryx2-bb-elementary"
description = "iceoryx2: [internal] elementary constructs that have (almost) no dependencies at all"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[lints]
workspace = true

[features]
default = []

std = [
  "iceoryx2-pal-concurrency-sync/std",
]

[dependencies]
iceoryx2-bb-elementary-traits = { workspace = true }
iceoryx2-pal-concurrency-sync = { workspace = true }

[dev-dependencies]
iceoryx2-bb-elementary-tests-common = { workspace = true, features = ["std"] }
iceoryx2-bb-loggers = { workspace = true, features = ["std"] }
iceoryx2-bb-testing = { workspace = true, features = ["std"] }
iceoryx2-bb-testing-macros = { workspace = true, features = ["std"] }

[[test]]
name = "tests"
harness = false
