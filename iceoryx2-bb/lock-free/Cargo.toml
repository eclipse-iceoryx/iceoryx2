[package]
name = "iceoryx2-bb-lock-free"
description = "iceoryx2: [internal] lock-free containers and constructs"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[lints]
workspace = true

[features]
default = []

std = [
  "iceoryx2-log/std",
  "iceoryx2-bb-concurrency/std",
  "iceoryx2-bb-elementary/std"
]

[dependencies]
iceoryx2-log = { workspace = true }
iceoryx2-bb-concurrency = { workspace = true }
iceoryx2-bb-elementary = { workspace = true }
iceoryx2-bb-elementary-traits = { workspace = true }

[dev-dependencies]
iceoryx2-bb-lock-free-tests-common = { workspace = true, features = ["std"] }
iceoryx2-bb-loggers = { workspace = true, features = ["std"] }
iceoryx2-bb-testing = { workspace = true, features = ["std"] }

generic-tests = { workspace = true }

[target.'cfg(loom)'.dev-dependencies]
loom = { workspace = true }
