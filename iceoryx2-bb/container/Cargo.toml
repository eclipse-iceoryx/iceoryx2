[package]
name = "iceoryx2-bb-container"
description = "iceoryx2: IPC shared memory compatible containers"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
default = []

std = [
  "iceoryx2-log/std",  
  "iceoryx2-bb-concurrency/std",  
  "iceoryx2-bb-derive-macros/std",  
  "iceoryx2-bb-elementary/std",  
  "iceoryx2-bb-loggers/std",
]

[dependencies]
iceoryx2-log = { workspace = true }
iceoryx2-bb-derive-macros = { workspace = true }
iceoryx2-bb-elementary = { workspace = true }
iceoryx2-bb-elementary-traits = { workspace = true }
iceoryx2-bb-concurrency = { workspace = true }

serde = { workspace = true }

[dev-dependencies]
iceoryx2-bb-loggers = { workspace = true, features = ["std"] }
iceoryx2-bb-container-tests-common = { workspace = true, features = ["std"] }
iceoryx2-bb-testing = { workspace = true, features = ["std"] }

serde_test = { workspace = true }

[[test]]
name = "tests"
harness = false
