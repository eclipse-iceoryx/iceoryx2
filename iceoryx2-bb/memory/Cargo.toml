[package]
name = "iceoryx2-bb-memory"
description = "iceoryx2: [internal] allocators and tools for memory management"
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[features]
default = []

std = [
  "iceoryx2-log/std",  
  "iceoryx2-bb-elementary/std",
  "iceoryx2-bb-concurrency/std",
  "iceoryx2-bb-lock-free/std",
  "iceoryx2-bb-posix/std"
]

[dependencies]
iceoryx2-log = { workspace = true }
iceoryx2-bb-lock-free = { workspace = true }
iceoryx2-bb-concurrency = { workspace = true }
iceoryx2-bb-elementary = { workspace = true }
iceoryx2-bb-elementary-traits = { workspace = true }
iceoryx2-bb-posix = { workspace = true }

[dev-dependencies]
iceoryx2-bb-loggers = { workspace = true }
iceoryx2-bb-memory-tests-common = { workspace = true, features = ["std"] }
